services:
  db:
    image: mysql:8.0
    container_name: codingmania-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-codemaniav01_db}
    # Host port 3307 to avoid clashing with a local MySQL already on 3306.
    # The backend still reaches it internally as db:3306.
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./Backend
    container_name: codingmania-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # All app secrets (JWT, email, ImageKit, Razorpay, Google, Gemini...) come
    # from Backend/.env. DATABASE_URL below overrides the one in that file so it
    # points at the `db` service instead of localhost.
    env_file:
      - ./Backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-rootpass}@db:3306/${DB_NAME:-codemaniav01_db}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_IMAGEKIT_URL: ${VITE_IMAGEKIT_URL:-}
    container_name: codingmania-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
  backend_uploads:
